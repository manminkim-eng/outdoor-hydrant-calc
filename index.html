<style>

/* PWA 설치 배너 */
.pwa-install-banner{
  background:linear-gradient(135deg,#15803d 0%,#14532d 100%);
  border:1px solid rgba(255,255,255,0.2);
  animation:slideUp 0.4s ease-out;
}
@keyframes slideUp{
  from{transform:translateY(100%);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* ══════════════════════════════════════════════════
   📐 계산식 안내 FAB
══════════════════════════════════════════════════ */
.fml-fab{
  position:fixed;bottom:82px;right:18px;z-index:1200;
  background:linear-gradient(135deg,#15803d,#052e16);
  color:white;border:none;border-radius:16px;
  padding:11px 15px;cursor:pointer;
  box-shadow:0 4px 20px rgba(21,128,61,0.55);
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-family:'Noto Sans KR',sans-serif;line-height:1.3;
  transition:transform .15s,box-shadow .15s;
}
.fml-fab:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(21,128,61,0.7);}
.fml-fab:active{transform:translateY(0);}

/* ══════════════════════════════════════════════════
   📲 PWA 설치 FAB 버튼
══════════════════════════════════════════════════ */
.pwa-fab{
  position:fixed;bottom:18px;right:18px;z-index:1200;
  background:linear-gradient(135deg,#1d4ed8,#1e3a8a);
  color:white;border:none;border-radius:16px;
  padding:11px 15px;cursor:pointer;
  box-shadow:0 4px 20px rgba(29,78,216,0.60);
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-family:'Noto Sans KR',sans-serif;line-height:1.3;
  transition:transform .15s,box-shadow .15s;
  animation:pwaFabIn 0.5s cubic-bezier(0.34,1.5,0.64,1);
}
@keyframes pwaFabIn{
  from{transform:scale(0) rotate(-20deg);opacity:0;}
  to{transform:scale(1) rotate(0deg);opacity:1;}
}
.pwa-fab:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 8px 28px rgba(29,78,216,0.75);}
.pwa-fab:active{transform:translateY(0) scale(0.97);}
.pwa-fab-badge{
  position:absolute;top:-6px;right:-6px;
  background:#ef4444;color:white;
  font-size:9px;font-weight:800;
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:2px solid white;animation:badgePulse 2s ease-in-out infinite;
}
@keyframes badgePulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.2);}
}

/* ══════════════════════════════════════════════════
   모달 오버레이
══════════════════════════════════════════════════ */
.fml-overlay{
  position:fixed;inset:0;z-index:9000;
  background:rgba(0,0,0,0.62);backdrop-filter:blur(5px);
  display:flex;align-items:center;justify-content:center;padding:16px;
  animation:fmlFadeIn .2s ease-out;
}
@keyframes fmlFadeIn{from{opacity:0;}to{opacity:1;}}

/* ══════════════════════════════════════════════════
   모달 박스 — 데스크톱/태블릿 중앙
══════════════════════════════════════════════════ */
.fml-box{
  background:#ffffff;border-radius:20px;
  width:100%;max-width:800px;
  max-height:calc(100vh - 32px);
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,0.38);
  animation:fmlSlideUp .25s cubic-bezier(0.34,1.5,0.64,1);
}
@keyframes fmlSlideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* 헤더 */
.fml-hd{
  background:linear-gradient(135deg,#052e16,#14532d,#15803d);
  color:white;padding:18px 22px 0;flex-shrink:0;
}
.fml-hd-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.fml-close{
  background:rgba(255,255,255,0.13);border:none;color:white;
  border-radius:50%;width:34px;height:34px;flex-shrink:0;
  cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.fml-close:hover{background:rgba(255,255,255,0.26);}

/* 내부 탭바 */
.fml-tabs{
  display:flex;overflow-x:auto;gap:0;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.fml-tabs::-webkit-scrollbar{display:none;}
.fml-tab{
  padding:9px 18px;border:none;background:transparent;
  color:rgba(255,255,255,0.6);font-size:12px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;
  border-bottom:3px solid transparent;transition:all .15s;flex-shrink:0;
}
.fml-tab.on{color:#fff;border-bottom-color:#4ade80;}
.fml-tab:hover:not(.on){color:rgba(255,255,255,0.88);}

/* 바디 */
.fml-bd{
  overflow-y:auto;padding:20px 22px 26px;flex:1;
  -webkit-overflow-scrolling:touch;
}
.fml-bd::-webkit-scrollbar{width:5px;}
.fml-bd::-webkit-scrollbar-thumb{background:#bbf7d0;border-radius:3px;}
.fml-bd::-webkit-scrollbar-track{background:transparent;}

/* ═══ A4 계산서 반응형 미리보기 ═══
   transform-origin:0 0 + translateX(lOff)scale(s) 방식:
   ① 794px(A4) 기준 좌상단(0,0)으로 축소
   ② translateX 로 정확히 중앙 정렬
   ③ outer.height = inner.scrollHeight×scale 로 보정
   → 여러 장도 자동 대응 / 인쇄 시 transform:none 복원  */
.rpt-outer{
  width:100%;overflow:hidden;
  background:#e8f5e9;padding:20px 12px;
  border-radius:14px;margin-bottom:16px;
}
.rpt-inner{
  width:794px;
  /* JS: transform-origin:0 0; transform:translateX(N)scale(S) */
}

  display:none;
  align-items:center;gap:6px;
  background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;

  margin-bottom:10px;
}

    border-radius:0!important;margin:0!important;height:auto!important;}
  .rpt-inner{transform:none!important;width:auto!important;margin:0!important;}
  .rpt-hint{display:none!important;}

/* ═══ 배관 구간 테이블 모바일 스크롤 힌트 ═══ */

/* ═══ Box 컴포넌트 — 다크 헤더 바 스타일 ═══ */

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

/* ═══ 상수 (NFPC 109) ═══════════════════════════════════════ */
const NOZZLE_HEAD      = 25;    // 노즐선단 방수압력 환산수두 0.25 MPa = 25 m
const FLOW_PER_HYDRANT = 350;   // 옥외소화전 개당 방사량 (ℓ/min) — NFPC 109 제5조①③
const WATER_TIME       = 20;    // 방사시간 (min)
const MAX_HYDRANTS     = 2;     // 동시사용 최대 개수

const PIPE_CONFIG = {
  SCH10:{label:"배관용 탄소강관 KS D3507 (백관)",        shortLabel:"KS D3507",       C:120,
         inner:{40:42.1,50:53.2,65:69.0,80:81.0,100:105.3,125:130.1,150:155.5,200:204.6}},
  SCH40:{label:"압력 배관용 탄소강관 KS D 3562 (흑관)",  shortLabel:"KS D3562",       C:120,
         inner:{40:40.9,50:52.5,65:62.7,80:77.9,100:102.3,125:128.2,150:154.1,200:202.7}},
  STS:  {label:"배관용 스테인리스강관 KS D 3595",        shortLabel:"STS(스테인리스)",C:150,
         inner:{40:42.8,50:54.8,65:70.0,80:85.0,100:108.2,125:133.4,150:160.0,200:210.0}},
};

/* [90°엘보,45°엘보,분류T,직류T,Gate,Ball,Angle,Check] */
const FITTING_EQ={
  40:[1.5,0.90,2.1,0.45,0.30,13.8,6.5,3.1], 50:[2.1,1.20,3.0,0.60,0.39,16.5,8.4,4.0],
  65:[2.4,1.30,3.6,0.75,0.48,19.5,10.2,4.6],80:[3.0,1.80,4.5,0.90,0.60,24.0,12.0,5.7],
  100:[4.2,2.40,6.3,1.20,0.81,37.5,16.5,7.6],125:[5.1,3.00,7.5,1.50,0.99,42.0,21.0,10.0],
  150:[6.0,3.60,9.0,1.80,1.20,49.5,24.0,12.0],200:[6.5,3.70,14.0,4.00,1.40,70.0,33.0,15.0],
};

/* 옥외소화전 전용 호스 — 65mm 호스 (NFPC 109 제6조②) */
const HOSE_TYPES={
  1:{label:"65mm 마(아마)호스",    rate:8,  fixed:null},
  2:{label:"65mm 고무내장호스",    rate:4,  fixed:null},
};

const PUMP_EFF={40:0.40,50:0.45,65:0.55,80:0.55,100:0.60,125:0.65,150:0.70};
const TRANS_TYPE={1:{label:"전동기 직결",k:1.1},2:{label:"전동기 이외의 원동기",k:1.15}};
const PIPE_SIZES=[40,50,65,80,100,125,150,200];
const PUMP_SIZES=[40,50,65,80,100,125,150];
const HP_STEPS=[3,5,7.5,10,15,20,25,30,40,50,60,75,100,125,150,200];

/* ═══ 유틸리티 ══════════════════════════════════════════════ */
function calcFriction(Q,D,pipeType){
  if(!Q||!D)return 0;
  const cfg=PIPE_CONFIG[pipeType]||PIPE_CONFIG.SCH10;
  const Di=cfg.inner[D];if(!Di)return 0;
  return 10.67*Math.pow(Q/60000,1.852)/(Math.pow(cfg.C,1.852)*Math.pow(Di/1000,4.87))*100;
}
function calcVelocity(Q,D,pipeType){
  if(!Q||!D)return 0;
  const cfg=PIPE_CONFIG[pipeType]||PIPE_CONFIG.SCH10;
  const Di=cfg.inner[D];if(!Di)return 0;
  return (Q/60000)/(Math.PI*Math.pow(Di/2000,2));
}
function nextHP(kw){const hp=kw*1.341;for(const h of HP_STEPS){if(h>=hp)return h;}return Math.ceil(hp/5)*5;}
function f3(v){if(v===null||v===undefined||isNaN(v))return"─";return(Math.round(v*1000)/1000).toFixed(3);}
function f2(v){if(v===null||v===undefined||isNaN(v))return"─";return(Math.round(v*100)/100).toFixed(2);}
function f1(v){if(v===null||v===undefined||isNaN(v))return"─";return(Math.round(v*10)/10).toFixed(1);}
function ff(v,d=2){if(v===null||v===undefined||isNaN(v))return"─";return(Math.round(v*Math.pow(10,d))/Math.pow(10,d)).toFixed(d);}
const mkSeg=()=>({flow:350,dia:100,len:0,e90:0,e45:0,teeB:0,teeS:0,gate:0,ball:0,angle:0,check:0});

/* ═══ 공통 스타일 토큰 ══════════════════════════════════════ */
const BD="1px solid #d1d5db";
const S={
  border:BD,
  cell:{border:BD,padding:"4px 6px",textAlign:"center",fontFamily:"'Noto Sans KR',sans-serif",fontSize:11},
};
const SEC_TITLE_STYLE={
  background:"#14532d",color:"white",padding:"7px 14px",

/* ═══ 메인 앱 ══════════════════════════════════════════════ */
function App(){
  const[tab,setTab]=useState((()=>{const t=new URLSearchParams(location.search).get('tab');return t!==null?parseInt(t)||0:0;})());
  const[showFormula,setShowFormula]=useState(false);
  const[proj,setProj]=useState({name:"만민 건축사 신사옥 신축공사 현장",designer:"김만민",date:new Date().toISOString().slice(0,10)});
  const[sys,setSys]=useState({
    hydrants:2,         // 설치 소화전 수 (최대 2개 동시사용)
    actualHead:10,      // 실양정
    hoseLen:15,         // 호스 길이 (m) — 15m × 1본(기본)
    hoseType:2,         // 호스 타입
    transType:1,
    pumpDia:100,
    pumpEff:60,
    pipeType:"SCH10",
  });
  const[segs,setSegs]=useState([
    {flow:700,dia:100,len:30,e90:2,e45:1,teeB:1,teeS:6,gate:2,ball:0,angle:1,check:1},
    {flow:350,dia:80, len:20,e90:0,e45:0,teeB:1,teeS:0,gate:0,ball:0,angle:0,check:0},
    {flow:350,dia:65, len:15,e90:0,e45:0,teeB:1,teeS:0,gate:0,ball:0,angle:1,check:0},
  ]);

  const sp=(k,v)=>setProj(p=>({...p,[k]:v}));
  const ss=(k,v)=>setSys(s=>({...s,[k]:v}));
  const upd=(i,k,v)=>setSegs(prev=>prev.map((s,j)=>j===i?{...s,[k]:v}:s));
  const rem=i=>setSegs(prev=>prev.filter((_,j)=>j!==i));
  const add=()=>setSegs(prev=>[...prev,mkSeg()]);

  /* ═══ A4 계산서 반응형 스케일링 ═══
     transform-origin:0 0 + translateX(lOff)scale(s):
     ① 794px(A4폭)을 좌상단 기준으로 축소
     ② lOff = (outerW - A4W×scale) / 2 로 정확한 중앙 정렬
     ③ outer.height = inner.scrollHeight×scale+40 으로 빈공간 없앰
     ⑤ 인쇄 시 CSS @media print 로 transform:none 복원          */
  useEffect(()=>{
    if(tab!==2)return;
    function scaleRpt(){
      const outer=document.getElementById('rpt-outer');
      const inner=document.getElementById('rpt-inner');
      if(!outer||!inner)return;
      const A4W=794;
      const outerW=outer.clientWidth;
      const scale=Math.min(1,(outerW-24)/A4W);
      if(scale>=1){

              </div>

              {/* ─ 적용 법령 ─ */}
              <div style={{padding:13,background:"#f8fafc",borderRadius:8,fontSize:11,color:"#6b7280",border:BD,fontFamily:"'Noto Sans KR',sans-serif",lineHeight:1.9}}>
                <b style={{color:"#374151"}}>▣ 적용 법령 및 기준</b><br/>
                ① 화재안전성능기준 NFPC 109 (옥외소화전설비의 화재안전성능기준)<br/>
                &nbsp;&nbsp;&nbsp;[소방청고시 제2025-25호, 2025. 12. 24. 타법개정, 시행 2026. 3. 1.]<br/>
                &nbsp;&nbsp;- 제4조 (수원): 설치개수(최대 2개) × 7 m³ 이상<br/>
                &nbsp;&nbsp;- 제5조①③ (가압송수장치): 방수압 0.25 MPa 이상, 방수량 350 ℓ/min 이상 (최대 2개 동시사용)<br/>
                &nbsp;&nbsp;- 제6조② (호스): 구경 65 mm 호스 사용<br/>
                ② 배관 마찰손실: Hazen-Williams 공식 — {C.pCfg.shortLabel}, C = {C.pCfg.C} 적용
                {sys.pipeType==="STS"&&" (내식성 배관 — C=150 적용)"}
              </div>

              <div id="dev-stamp" style={{fontFamily:"'Orbitron',sans-serif",fontWeight:700,letterSpacing:"0.08em"}}>MANMIN · Ver-3.2</div>

            </div>{/* /report-zone */}
            </div>{/* /rpt-inner */}
            </div>{/* /rpt-outer */}
          </div>
        )}

      </div>
    </div>

    {/* ═══ PWA 설치 배너 ═══ */}
    {showInstallBanner && (
      <div style={{position:"fixed",bottom:16,left:16,right:16,zIndex:9999}} className="pwa-install-banner"
           onClick={e=>e.stopPropagation()}>
        <div style={{borderRadius:16,padding:16,display:"flex",alignItems:"center",gap:12}}>
          <img src="icons/icon-192.png" style={{width:48,height:48,borderRadius:12,flexShrink:0,boxShadow:"0 4px 12px rgba(0,0,0,0.3)"}} alt="앱"/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:"white",fontSize:13,fontWeight:800}}>홈 화면에 설치하시겠습니까?</div>
            <div style={{color:"#86efac",fontSize:10,fontWeight:600,marginTop:4}}>오프라인에서도 사용 가능합니다</div>
          </div>
          <div style={{display:"flex",gap:8,flexShrink:0}}>
            <button onClick={()=>setShowInstallBanner(false)} style={{color:"rgba(255,255,255,0.6)",fontSize:11,fontWeight:700,padding:"8px 12px",border:"none",background:"transparent",cursor:"pointer",borderRadius:8}}>닫기</button>
            <button onClick={handleInstall} style={{background:"white",color:"#15803d",fontSize:11,fontWeight:900,padding:"8px 16px",border:"none",borderRadius:8,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>설치</button>
          </div>
        </div>
      </div>
    )}

    {/* ═══ 계산식 안내 FAB ═══ */}
    <button className="fml-fab no-print" style={{bottom:90}} onClick={()=>setShowFormula(true)} aria-label="계산식 안내 열기">
      <span style={{fontSize:20,lineHeight:1}}>📐</span>
      <span style={{fontSize:10,fontWeight:800,letterSpacing:"0.04em"}}>계산식</span>
      <span style={{fontSize:9,opacity:0.75}}>안내</span>
    </button>

    {/* ═══ PWA 설치 FAB ═══ */}
    {deferredPrompt && (
      <button className="pwa-fab no-print" onClick={handleInstall} aria-label="앱 설치하기">
        <div className="pwa-fab-badge">NEW</div>
        <span style={{fontSize:20,lineHeight:1}}>📲</span>
        <span style={{fontSize:10,fontWeight:800,letterSpacing:"0.04em"}}>앱 설치</span>
        <span style={{fontSize:9,opacity:0.75}}>바로가기</span>
      </button>
    )}

    {/* ═══ 계산식 안내 모달 ═══ */}
    {showFormula&&<FormulaModal onClose={()=>setShowFormula(false)}/>}

    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- ═══ Service Worker Ver 3.2 — 재설치 문제 원천 차단 ═══ -->
<script>
(function(){
  'use strict';
  if(!('serviceWorker' in navigator)) return;

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', {updateViaCache:'none'})
      .then(reg => {
        console.log('[PWA v3.2] SW 등록 — scope:', reg.scope);

        /* ★ 핵심: 대기 중인 SW가 있으면 즉시 skipWaiting 적용
           재설치 후 이전 SW가 waiting 상태로 남아 있을 때 처리 */
        if(reg.waiting) {
          console.log('[PWA v3.2] waiting SW 감지 → skipWaiting 즉시 적용');
          reg.waiting.postMessage({type:'SKIP_WAITING'});
        }

        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if(!nw) return;
          nw.addEventListener('statechange', () => {
            if(nw.state === 'installed' && navigator.serviceWorker.controller)
              _showUpdateBanner();
          });
        });

        setInterval(() => reg.update(), 60 * 60 * 1000);
      })
      .catch(e => console.warn('[PWA v3.2] SW 등록 실패:', e));

    let _ref = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if(!_ref){ _ref = true; location.reload(); }
    });

    /* SW로부터 CACHE_CLEARED 메시지 수신 시 페이지 새로고침 */
    navigator.serviceWorker.addEventListener('message', (event) => {
      if(event.data && event.data.type === 'CACHE_CLEARED') {
        console.log('[PWA v3.2] 캐시 초기화 완료 → 새로고침');
        location.reload();
      }
    });
  });

  /* appinstalled 이벤트 — 설치 완료 시 플래그 기록 */
  window.addEventListener('appinstalled', () => {
    console.log('[PWA v3.2] 설치 완료 (appinstalled)');
    sessionStorage.setItem('pwa-installed', '1');
  });

  /* standalone 모드로 실행 중이면 설치 UI 숨김 */
  if(window.matchMedia('(display-mode:standalone)').matches || window.navigator.standalone === true){
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('pwa-hdr-btn');
      if(btn) btn.style.display = 'none';
    });
  }

  function _showUpdateBanner() {
    if(document.getElementById('sw-update-banner')) return;
    const b = document.createElement('div');
    b.id = 'sw-update-banner';
    b.style.cssText = [
      'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:99999',
      'background:#14532d;color:white;border-radius:14px;padding:12px 18px',
      'display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.4)',
      'font-family:"Noto Sans KR",sans-serif;font-size:13px;white-space:nowrap',
      'animation:slideUp .35s ease-out',
      'border:1px solid rgba(255,255,255,0.2)',
    ].join(';');
    b.innerHTML =
      '<span>🔄 새 버전 (v3.2) 이 있습니다</span>' +
      '<button onclick="(function(){' +
        'document.getElementById(\'sw-update-banner\').remove();' +
        'navigator.serviceWorker.ready.then(r=>{if(r.waiting)r.waiting.postMessage({type:\'SKIP_WAITING\'});});' +
      '})()" style="background:#16a34a;color:white;border:none;border-radius:8px;' +
        'padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;">업데이트</button>' +
      '<button onclick="document.getElementById(\'sw-update-banner\').remove()" ' +
        'style="background:rgba(255,255,255,0.15);color:white;border:none;border-radius:8px;' +
        'padding:6px 10px;font-size:11px;cursor:pointer;">나중에</button>';
    document.body.appendChild(b);
  }

  /* ★ 긴급 캐시 초기화 — 콘솔에서 clearPwaCache() 호출 가능 */
  window.clearPwaCache = function(){
    if(!navigator.serviceWorker.controller){
      console.warn('[PWA v3.2] 활성 SW 없음');
      return;
    }
    navigator.serviceWorker.controller.postMessage({type:'CLEAR_CACHE'});
    console.log('[PWA v3.2] CLEAR_CACHE 전송 — 캐시 초기화 중...');
  };
})();
</script>
</body>
